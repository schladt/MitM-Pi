# hostapd configuration for MitM-Pi WiFi Access Point
# This creates a WiFi AP that IoT devices will connect to

# Interface configuration
# This will be auto-detected by setup.sh (prefers ALFA AWUS1900 if present)
interface=wlan0

# Driver (nl80211 is standard for most modern WiFi adapters)
driver=nl80211

# Network name (SSID)
ssid=MitM-Pi

# WiFi channel (1-11 for 2.4GHz, adjust based on your region)
channel=6

# Hardware mode (g = 2.4GHz 802.11g)
hw_mode=g

# Country code (US = United States, adjust for your location)
# This is important for regulatory compliance and available channels
country_code=US

# Enable 802.11n (higher speeds)
ieee80211n=1

# Enable 40MHz channels (0 = 20MHz only, 1 = 40MHz)
# For better compatibility with IoT devices, 20MHz (0) is often safer
ht_capab=[HT40][SHORT-GI-20][DSSS_CCK-40]

# WMM (Wi-Fi Multimedia) - required for 802.11n
wmm_enabled=1

# Security settings
# WPA2-PSK with AES encryption (most compatible for IoT devices)
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# WiFi password (8-63 characters)
# CHANGE THIS! Default is intentionally weak for initial setup
wpa_passphrase=changeme123

# MAC address filtering (0 = disabled, 1 = enabled with whitelist, 2 = enabled with blacklist)
macaddr_acl=0

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2

# Additional settings for better stability
beacon_int=100
dtim_period=2

# Ignore broadcast SSID (0 = broadcast SSID, 1 = hidden SSID)
# Recommended to keep at 0 for easier device connection
ignore_broadcast_ssid=0

# Optional: Enable 5GHz if your adapter supports it
# Uncomment and adjust if using 5GHz
# hw_mode=a
# channel=36
# ieee80211ac=1
# vht_oper_chwidth=1
# vht_oper_centr_freq_seg0_idx=42
