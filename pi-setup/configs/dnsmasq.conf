# dnsmasq configuration for MitM-Pi
# Provides DHCP and DNS services for the WiFi Access Point

# Interface to listen on (WiFi AP interface)
interface=wlan0

# Never forward addresses in non-routed address spaces
bogus-priv

# Don't read /etc/resolv.conf or any other file
no-resolv

# Don't poll /etc/resolv.conf for changes
no-poll

# Use specific DNS servers (Google DNS, can be changed)
# These are the upstream DNS servers the Pi will use
server=8.8.8.8
server=8.8.4.4

# Alternatively, use Cloudflare DNS
# server=1.1.1.1
# server=1.0.0.1

# DHCP server configuration
# Enable DHCP server
dhcp-range=192.168.100.10,192.168.100.250,255.255.255.0,24h

# Gateway (this Pi)
dhcp-option=3,192.168.100.1

# DNS server (this Pi)
dhcp-option=6,192.168.100.1

# Broadcast address
dhcp-option=28,192.168.100.255

# Set the domain for dnsmasq
domain=mitm.local

# Local domains only
local=/mitm.local/

# Bind only to specified interfaces
bind-interfaces

# Authoritative DHCP server
dhcp-authoritative

# Cache size (default is 150, increase for better performance)
cache-size=1000

# DHCP lease file location
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# Log DHCP activity
log-dhcp

# Log DNS queries (uncomment for debugging)
# log-queries

# Log to syslog
log-facility=/var/log/dnsmasq.log

# Don't read /etc/hosts
no-hosts

# Additional static DHCP assignments can be added here
# Format: dhcp-host=<MAC address>,<IP address>,<hostname>,<lease time>
# Example:
# dhcp-host=aa:bb:cc:dd:ee:ff,192.168.100.50,iot-device,infinite

# DNS settings for captive portal detection
# Some IoT devices check connectivity by resolving specific domains
# Respond to common connectivity check domains
address=/connectivitycheck.gstatic.com/216.58.217.142
address=/clients3.google.com/216.58.217.142
address=/captive.apple.com/17.253.144.10

# Prevent DHCP from providing subnet information to clients
# This can help with MITM transparency
dhcp-option=252,"\n"

# Provide NTP server (this Pi, if running ntpd)
# dhcp-option=option:ntp-server,192.168.100.1

# Increase the number of cached DHCP entries
dhcp-lease-max=250

# Send DHCP options for better IoT device compatibility
dhcp-option=vendor:MSFT,2,1i

# Enable DHCPv6 (uncomment if needed)
# dhcp-range=::1,constructor:wlan0,ra-names,64,12h
